<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | ProAvenir</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f5c7a 0%, #1e88a8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .reset-container {
      width: 100%;
      max-width: 500px;
    }

    .reset-card {
      background: white;
      border-radius: 2rem;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0b5e7e, #1e88a8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .login-logo span {
      color: #f39c12;
      background: none;
    }

    .login-subtitle {
      color: #6c8a9c;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #2c5a6e;
    }

    .input-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 1rem;
      border: 2px solid #e2e8f0;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .input-group input:focus {
      border-color: #1e88a8;
      outline: none;
      box-shadow: 0 0 0 3px rgba(30,136,168,0.1);
    }

    .password-strength {
      margin-top: 0.5rem;
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s;
    }

    .password-strength-bar.weak { background: #e74c3c; width: 33%; }
    .password-strength-bar.medium { background: #f39c12; width: 66%; }
    .password-strength-bar.strong { background: #27ae60; width: 100%; }

    .password-requirements {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #6c8a9c;
    }

    .password-requirements ul {
      margin-top: 0.3rem;
      padding-left: 1.2rem;
    }

    .password-requirements li {
      margin: 0.2rem 0;
    }

    .password-requirements li.valid {
      color: #27ae60;
      text-decoration: line-through;
    }

    .login-btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 1rem;
      border: none;
      background: linear-gradient(135deg, #0f5c7a, #1e88a8);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(15,92,122,0.3);
    }

    .reset-message {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 0.8rem;
      font-size: 0.85rem;
      display: none;
    }

    .reset-message.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .reset-message.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .error-msg {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-top: 0.4rem;
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-link a {
      color: #1e88a8;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="reset-card">
      <div class="login-header">
        <div class="login-logo">Pro<span>Avenir</span></div>
        <div class="login-subtitle">Create a new password</div>
      </div>
      
      <div id="tokenStatus" class="reset-message" style="display: none;"></div>
      
      <form id="resetPasswordForm">
        <div class="input-group">
          <label for="newPassword"><i class="fas fa-lock"></i> New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" required>
          <div class="password-strength">
            <div class="password-strength-bar" id="passwordStrengthBar"></div>
          </div>
          <div class="error-msg" id="passwordError"></div>
        </div>
        
        <div class="input-group">
          <label for="confirmPassword"><i class="fas fa-check-circle"></i> Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
          <div class="error-msg" id="confirmError"></div>
        </div>
        
        <div class="password-requirements">
          <strong>Password requirements:</strong>
          <ul>
            <li id="req-length">✗ At least 8 characters</li>
            <li id="req-uppercase">✗ At least one uppercase letter</li>
            <li id="req-lowercase">✗ At least one lowercase letter</li>
            <li id="req-number">✗ At least one number</li>
            <li id="req-special">✗ At least one special character (@$!%*?&)</li>
          </ul>
        </div>
        
        <button type="submit" class="login-btn">Reset Password</button>
      </form>
      
      <div class="back-link">
        <a href="../index.html">← Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    function showTokenStatus(message, type) {
      const statusDiv = document.getElementById('tokenStatus');
      statusDiv.textContent = message;
      statusDiv.className = `reset-message ${type}`;
      statusDiv.style.display = 'block';
    }
    
    // Check if token exists and is valid
    function checkTokenValidity() {
      if (!token) {
        showTokenStatus('Invalid or missing reset token. Please request a new password reset link.', 'error');
        document.getElementById('resetPasswordForm').style.display = 'none';
        return false;
      }
      
      // Get stored tokens from localStorage
      const resetTokens = JSON.parse(localStorage.getItem('resetTokens') || '{}');
      const tokenData = resetTokens[token];
      
      if (!tokenData) {
        showTokenStatus('Invalid reset token. Please request a new password reset link.', 'error');
        document.getElementById('resetPasswordForm').style.display = 'none';
        return false;
      }
      
      // Check if token has expired (24 hours = 86400000 milliseconds)
      const now = Date.now();
      if (now > tokenData.expiresAt) {
        showTokenStatus('This reset link has expired (24 hour limit). Please request a new password reset link.', 'error');
        document.getElementById('resetPasswordForm').style.display = 'none';
        // Clean up expired token
        delete resetTokens[token];
        localStorage.setItem('resetTokens', JSON.stringify(resetTokens));
        return false;
      }
      
      return true;
    }
    
    // Password validation function
    function validatePassword(password) {
      const requirements = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /[0-9]/.test(password),
        special: /[@$!%*?&]/.test(password)
      };
      
      // Update UI
      document.getElementById('req-length').innerHTML = (requirements.length ? '✓' : '✗') + ' At least 8 characters';
      document.getElementById('req-uppercase').innerHTML = (requirements.uppercase ? '✓' : '✗') + ' At least one uppercase letter';
      document.getElementById('req-lowercase').innerHTML = (requirements.lowercase ? '✓' : '✗') + ' At least one lowercase letter';
      document.getElementById('req-number').innerHTML = (requirements.number ? '✓' : '✗') + ' At least one number';
      document.getElementById('req-special').innerHTML = (requirements.special ? '✓' : '✗') + ' At least one special character (@$!%*?&)';
      
      document.getElementById('req-length').style.color = requirements.length ? '#27ae60' : '#e74c3c';
      document.getElementById('req-uppercase').style.color = requirements.uppercase ? '#27ae60' : '#e74c3c';
      document.getElementById('req-lowercase').style.color = requirements.lowercase ? '#27ae60' : '#e74c3c';
      document.getElementById('req-number').style.color = requirements.number ? '#27ae60' : '#e74c3c';
      document.getElementById('req-special').style.color = requirements.special ? '#27ae60' : '#e74c3c';
      
      // Calculate strength
      const strength = Object.values(requirements).filter(Boolean).length;
      const strengthBar = document.getElementById('passwordStrengthBar');
      
      if (strength <= 2) {
        strengthBar.className = 'password-strength-bar weak';
      } else if (strength <= 4) {
        strengthBar.className = 'password-strength-bar medium';
      } else {
        strengthBar.className = 'password-strength-bar strong';
      }
      
      return Object.values(requirements).every(Boolean);
    }
    
    // Password strength meter
    document.getElementById('newPassword').addEventListener('input', function(e) {
      validatePassword(e.target.value);
    });
    
    // Form submission
    document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      if (!checkTokenValidity()) return;
      
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // Validate password requirements
      if (!validatePassword(newPassword)) {
        document.getElementById('passwordError').textContent = '❌ Password does not meet requirements';
        return;
      } else {
        document.getElementById('passwordError').textContent = '';
      }
      
      // Check if passwords match
      if (newPassword !== confirmPassword) {
        document.getElementById('confirmError').textContent = '❌ Passwords do not match';
        return;
      } else {
        document.getElementById('confirmError').textContent = '';
      }
      
      // Get user email from token data
      const resetTokens = JSON.parse(localStorage.getItem('resetTokens') || '{}');
      const tokenData = resetTokens[token];
      const userEmail = tokenData.email;
      
      // Update user password in database
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const userIndex = users.findIndex(u => u.email === userEmail);
      
      if (userIndex !== -1) {
        users[userIndex].password = newPassword;
        localStorage.setItem('users', JSON.stringify(users));
      }
      
      // Remove used token
      delete resetTokens[token];
      localStorage.setItem('resetTokens', JSON.stringify(resetTokens));
      
      showTokenStatus('✅ Password reset successful! Redirecting to login...', 'success');
      
      setTimeout(() => {
        window.location.href = '../index.html';
      }, 2000);
    });
    
    // Initial token check
    checkTokenValidity();
  </script>
</body>
</html>
